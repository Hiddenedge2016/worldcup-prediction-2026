<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>рҹ“Ҡ йҫҷиҷҫйў„жөӢеҮҶеәҰ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .acc-page { max-width: 900px; margin: 0 auto; padding: 90px 20px 60px; }
    .acc-loading { text-align: center; padding: 60px 0; }
    .acc-loading .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-header { margin-bottom: 24px; }
    .accuracy-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .accuracy-stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .acc-stat-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
      text-align: center;
      transition: transform 0.2s;
    }
    .acc-stat-card:hover { transform: translateY(-2px); }
    .acc-stat-card .acc-stat-num { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .acc-stat-card .acc-stat-label { font-size: 12px; color: var(--text-muted); }
    .acc-stat-card .acc-stat-label small { font-size: 11px; opacity: 0.7; }
    .acc-stat-card.perfect .acc-stat-num { color: var(--green); }
    .acc-stat-card.good .acc-stat-num { color: var(--blue); }
    .acc-stat-card.miss .acc-stat-num { color: var(--red); }
    .acc-stat-card.overall .acc-stat-num { color: var(--gold); }
    .acc-stat-card.overall { border-color: var(--gold-dim); }
    .acc-details { display: flex; flex-direction: column; gap: 8px; }
    .acc-detail-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--bg-card);
      border-radius: 8px; border: 1px solid var(--border);
      font-size: 13px; flex-wrap: wrap;
    }
    .acc-detail-match { min-width: 140px; font-weight: 600; }
    .acc-detail-pred { color: var(--text-muted); }
    .acc-detail-real { color: var(--text-secondary); font-weight: 600; }
    .acc-detail-badge { margin-left: auto; padding: 2px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
    .acc-detail-badge.perfect { background: #22c55e30; color: #22c55e; }
    .acc-detail-badge.good { background: #3b82f630; color: #3b82f6; }
    .acc-detail-badge.miss { background: #ef444430; color: #ef4444; }
    .acc-detail-row.perfect { border-left: 3px solid var(--green); }
    .acc-detail-row.good { border-left: 3px solid var(--blue); }
    .acc-detail-row.miss { border-left: 3px solid var(--red); }
    .acc-empty { text-align: center; padding: 40px; color: var(--text-muted); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo" style="text-decoration:none;color:var(--text)">
        <span class="logo-icon">рҹҰһ</span>
        <span class="logo-text">йҫҷиҷҫдё–з•ҢжқҜ <span class="gold">йў„жөӢ 2026</span></span>
      </a>
      <div class="nav-update">
        <span class="update-dot"></span>
        <span>йў„жөӢеҮҶеәҰ</span>
      </div>
    </div>
  </nav>

  <div class="acc-page" id="app">
    <div class="acc-loading">
      <div class="spinner"></div>
      <p style="color:var(--text-muted)">жӯЈеңЁи®Ўз®—йҫҷиҷҫжЁЎеһӢзҡ„еҮҶеәҰ...</p>
    </div>
  </div>

  <script>
    const FLAGS = {
      'MEX':'рҹҮІрҹҮҪ','RSA':'рҹҮҝрҹҮҰ','KOR':'рҹҮ°рҹҮ·','CZE':'рҹҮЁрҹҮҝ',
      'CAN':'рҹҮЁрҹҮҰ','BIH':'рҹҮ§рҹҮҰ','QAT':'рҹҮ¶рҹҮҰ','SUI':'рҹҮЁрҹҮӯ',
      'BRA':'рҹҮ§рҹҮ·','MAR':'рҹҮІрҹҮҰ','HAI':'рҹҮӯрҹҮ№','SCO':'рҹҸҙу Ғ§у Ғўу Ғіу ҒЈу Ғҙу Ғҝ',
      'USA':'рҹҮәрҹҮё','PAR':'рҹҮөрҹҮҫ','AUS':'рҹҮҰрҹҮә','TUR':'рҹҮ№рҹҮ·',
      'GER':'рҹҮ©рҹҮӘ','CUW':'рҹҮЁрҹҮј','CIV':'рҹҮЁрҹҮ®','ECU':'рҹҮӘрҹҮЁ',
      'NED':'рҹҮірҹҮұ','JPN':'рҹҮҜрҹҮө','SWE':'рҹҮёрҹҮӘ','TUN':'рҹҮ№рҹҮі',
      'ESP':'рҹҮӘрҹҮё','CPV':'рҹҮЁрҹҮ»','BEL':'рҹҮ§рҹҮӘ','EGY':'рҹҮӘрҹҮ¬',
      'KSA':'рҹҮёрҹҮҰ','URU':'рҹҮәрҹҮҫ','NZL':'рҹҮірҹҮҝ','POR':'рҹҮөрҹҮ№',
      'FRA':'рҹҮ«рҹҮ·','SEN':'рҹҮёрҹҮі','IRQ':'рҹҮ®рҹҮ¶','NOR':'рҹҮірҹҮҙ',
      'ARG':'рҹҮҰрҹҮ·','ALG':'рҹҮ©рҹҮҝ','JOR':'рҹҮҜрҹҮҙ','AUT':'рҹҮҰрҹҮ№',
      'COL':'рҹҮЁрҹҮҙ','COD':'рҹҮЁрҹҮ©','UZB':'рҹҮәрҹҮҝ','IRN':'рҹҮ®рҹҮ·',
      'ENG':'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ','CRO':'рҹҮӯрҹҮ·','GHA':'рҹҮ¬рҹҮӯ','PAN':'рҹҮөрҹҮҰ',
    };

    function getRealScore(group, home, away, results) {
      if (!results || !results[group]) return null;
      return results[group].matches.find(m => m.home === home && m.away === away) || null;
    }

    function render(data, results) {
      var total = 0, exact = 0, outcome = 0, miss = 0;
      var details = [];

      Object.keys(data).forEach(function(g) {
        var grp = data[g];
        grp.matches.forEach(function(m) {
          var real = getRealScore(g, m.home, m.away, results);
          if (!real || real.status !== 'finished') return;
          total++;
          var pts = real.score.split('-').map(Number);
          var predBest = m.bestScore.split('-').map(Number);
          var scoreExact = pts[0] === predBest[0] && pts[1] === predBest[1];

          var hw = parseFloat(m.winProb.homeWin);
          var dw = parseFloat(m.winProb.draw);
          var aw = parseFloat(m.winProb.awayWin);
          var outcomePred = hw > dw && hw > aw ? 'H' : (aw > hw && aw > dw ? 'A' : 'D');
          var outcomeReal = pts[0] > pts[1] ? 'H' : (pts[0] < pts[1] ? 'A' : 'D');
          var outcomeCorrect = outcomePred === outcomeReal;

          if (scoreExact) exact++;
          else if (outcomeCorrect) outcome++;
          else miss++;

          details.push({
            match: (FLAGS[m.home] || m.home) + ' ' + m.homeName + ' vs ' + m.awayName + ' ' + (FLAGS[m.away] || m.away),
            predicted: m.bestScore,
            actual: real.score,
            scoreExact: scoreExact,
            outcomeCorrect: outcomeCorrect,
            top5Includes: m.top5.some(function(t) { return t.score === real.score; })
          });
        });
      });

      if (total === 0) {
        document.getElementById('app').innerHTML =
          '<div class="section-header"><h2>рҹ“Ҡ йҫҷиҷҫйў„жөӢеҮҶеәҰ</h2><p style="color:var(--text-muted);font-size:14px;margin-top:8px">жҡӮж— е·Іе®ҢиөӣжҜ”иөӣпјҢж•°жҚ®з§ҜзҙҜдёӯ...</p></div>';
        return;
      }

      var accExact = (exact / total * 100).toFixed(0);
      var accOutcome = ((exact + outcome) / total * 100).toFixed(0);

      var html = '<div class="section-header"><h2>рҹ“Ҡ йҫҷиҷҫйў„жөӢеҮҶеәҰ</h2><p style="color:var(--text-muted);margin-top:4px">дёҺе®һйҷ…жҜ”иөӣз»“жһңеҜ№жҜ” В· ж•°жҚ®дјҡйҡҸиөӣзЁӢжҺЁиҝӣе®һж—¶жӣҙж–°</p></div>';
      html += '<div class="accuracy-stats-grid">';
      html += '<div class="acc-stat-card perfect"><div class="acc-stat-num">' + exact + '</div><div class="acc-stat-label">зІҫеҮҶе‘Ҫдёӯ<br><small>жҜ”еҲҶе®Ңе…ЁдёҖиҮҙ</small></div></div>';
      html += '<div class="acc-stat-card good"><div class="acc-stat-num">' + outcome + '</div><div class="acc-stat-label">ж–№еҗ‘жӯЈзЎ®<br><small>иғңе№іиҙҹзҢңеҜ№</small></div></div>';
      html += '<div class="acc-stat-card miss"><div class="acc-stat-num">' + miss + '</div><div class="acc-stat-label">йў„жөӢеҒҸе·®<br><small>з»“жһңдёҚз¬Ұ</small></div></div>';
      html += '<div class="acc-stat-card overall"><div class="acc-stat-num">' + accOutcome + '%</div><div class="acc-stat-label">ж–№еҗ‘еҮҶзЎ®зҺҮ<br><small>' + total + 'еңәе·Іе®Ңиөӣ</small></div></div>';
      html += '</div><div class="acc-details">';

      for (var i = 0; i < details.length; i++) {
        var d = details[i];
        var badge = d.scoreExact ? 'рҹҺҜзІҫеҮҶе‘Ҫдёӯ' : d.outcomeCorrect ? 'вң…ж–№еҗ‘еҜ№' : 'вқҢеҒҸе·®';
        var cls = d.scoreExact ? 'perfect' : d.outcomeCorrect ? 'good' : 'miss';
        var top5Str = d.top5Includes ? ' (Top5еҶ…жңү)' : '';
        html += '<div class="acc-detail-row ' + cls + '">';
        html += '<span class="acc-detail-match">' + d.match + '</span>';
        html += '<span class="acc-detail-pred">йў„жөӢ ' + d.predicted + '</span>';
        html += '<span class="acc-detail-real">е®һйҷ… ' + d.actual + '</span>';
        html += '<span class="acc-detail-badge ' + cls + '">' + badge + top5Str + '</span>';
        html += '</div>';
      }
      html += '</div>';

      html += '<div class="monetize-banner" style="max-width:900px;margin:24px auto 0">' +
        '<div class="icon">рҹӨ–</div>' +
        '<div class="text"><h3>жғіиҰҒиҮӘе·ұзҡ„ AI йў„жөӢжЁЎеһӢпјҹ</h3><p>йҫҷиҷҫз”Ёзҡ„е°ұжҳҜиҝҷеҘ— APIпјҢдҪ д№ҹеҸҜд»Ҙз”Ёе®ғжҗӯе»әиҮӘе·ұзҡ„ AI еә”з”Ё</p></div>' +
        '<a href="http://120.26.84.145:3000" target="_blank" class="monetize-btn">иҺ·еҸ– API вҶ’</a>' +
        '</div>' +
        '
<div class="donate-box">' +
        '
<div class="donate-box-header"><span class="lobster">рҹҰһ</span><h3>и§үеҫ—йў„жөӢиҝҳдёҚй”ҷпјҹ</h3><p>иҜ·иҝҷеҸӘеҠӘеҠӣз®—ж•°жҚ®зҡ„йҫҷиҷҫе–қдёҖжқҜ</p></div>
<div class="donate-box-body"><div class="qr-wrap"><img src="donate.png"></div><div class="qr-label">жү«з Ғжү“иөҸ В· йҡҸзјҳж”ҜжҢҒ</div></div>
<div class="donate-box-footer"><p>иҜ· <span class="name">йҫҷиҷҫ</span> е–қз“¶<span class="beer">рҹҚә</span></p></div>' +
        '' +
        '</div>';

      document.getElementById('app').innerHTML = html;
    }

    Promise.all([
      fetch('predictions.json').then(function(r) { return r.json(); }),
      fetch('results.json').catch(function() { return null; }).then(function(r) { return r ? r.json() : null; })
    ]).then(function(res) {
      render(res[0], res[1]);
    }).catch(function(e) {
      document.getElementById('app').innerHTML = '<div class="acc-empty">рҹҳҝ еҠ иҪҪеӨұиҙҘ: ' + e.message + '</div>';
    });
  </script>
</body>
</html>
